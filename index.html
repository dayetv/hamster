<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>达耶治疗院</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  /* 五彩循环流动渐变背景 */
  background: linear-gradient(-45deg, #ff6b6b, #4ecdc4, #45b7ff, #ffd369, #c77dff);
  background-size: 400% 400%;
  animation: gradientShift 12s ease infinite;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Microsoft YaHei", sans-serif;
  color: #1d1d1f;
  padding-bottom: 40px;
  line-height: 1.65;
  min-height: 100vh;
}

/* 渐变流动动画 */
@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 顶部导航 Liquid Glass 毛玻璃 */
.top {
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: blur(22px) saturate(120%);
  -webkit-backdrop-filter: blur(22px) saturate(120%);
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  box-shadow: 0 1px 8px rgba(0, 0, 0, 0.06);
  position: sticky;
  top: 0;
  z-index: 99;
  border-bottom: 1px solid rgba(255,255,255,0.8);
}

.logo {
  font-size: 21px;
  font-weight: 600;
  color: #1d1d1f;
}

.btn {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: #007aff;
  border: 1px solid rgba(255,255,255,0.9);
  padding: 7px 16px;
  border-radius: 14px;
  font-weight: 500;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s ease;
}
.btn:hover {
  background: rgba(255,255,255,0.95);
}

.container {
  max-width: 1000px;
  margin: 24px auto;
  padding: 0 16px;
}

/* 液态玻璃卡片 */
.main-card {
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(24px) saturate(120%);
  -webkit-backdrop-filter: blur(24px) saturate(120%);
  border: 1px solid rgba(255, 255, 255, 0.9);
  border-radius: 24px;
  padding: 26px;
  margin-bottom: 20px;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
  font-size: 15px;
  text-align: center;
}
.main-card h3 {
  color: #007aff;
  margin-bottom: 14px;
  font-size: 17px;
  font-weight: 600;
}

.bottom-notice {
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(24px) saturate(120%);
  -webkit-backdrop-filter: blur(24px) saturate(120%);
  border: 1px solid rgba(255, 255, 255, 0.9);
  border-radius: 24px;
  padding: 18px;
  text-align: center;
  font-size: 14px;
  color: #6e6e73;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
}

/* 公告弹窗 顺滑过渡动画 */
.notice-modal {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0);
  backdrop-filter: blur(0px);
  -webkit-backdrop-filter: blur(0px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: all 0.35s cubic-bezier(0.2, 0, 0.2, 1);
}
.notice-modal.show {
  opacity: 1;
  pointer-events: auto;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.notice-box {
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(26px) saturate(130%);
  -webkit-backdrop-filter: blur(26px) saturate(130%);
  border: 1px solid rgba(255,255,255,0.92);
  width: 90%;
  max-width: 400px;
  border-radius: 26px;
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  transform: scale(0.88) translateY(10px);
  transition: all 0.35s cubic-bezier(0.2, 0, 0.2, 1);
}
.notice-modal.show .notice-box {
  transform: scale(1) translateY(0);
}
.notice-head {
  background: rgba(255,255,255,0.4);
  padding: 14px 20px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 16px;
}
.close-btn {
  background: rgba(0,0,0,0.06);
  border: none;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  color: #1d1d1f;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}
.close-btn:hover {
  background: rgba(0,0,0,0.12);
}
.notice-body {
  padding: 28px 22px;
  text-align: center;
  font-size: 15px;
}
.tip-text {
  color: #ff3b30;
  font-weight: 500;
  margin-bottom: 24px;
  line-height: 1.7;
}
.line-btn {
  background: #007aff;
  color: #fff;
  padding: 10px 22px;
  border-radius: 16px;
  text-decoration: none;
  display: block;
  font-weight: 500;
  transition: opacity 0.2s;
  margin-bottom: 14px;
}
.line-btn:hover {
  opacity: 0.88;
}
</style>
</head>

<body>
<div class="top">
  <div class="logo">达耶治疗院</div>
  <button class="btn" onclick="openNotice()">公告</button>
</div>

<div class="container">
  <div class="main-card">
    <h3>观看说明</h3>
    <p>网页内置视频播放功能已关闭</p>
    <p>点击右上角公告按钮获取达耶TV多线路网盘资源</p>
    <p style="text-align:right; margin-top:12px;">—— 斯皮奇</p>
  </div>

  <div class="bottom-notice">
    本站仅作个人记录展示，无任何线下服务
  </div>
</div>

<!-- 公告弹窗 -->
<div class="notice-modal" id="noticeModal">
  <div class="notice-box">
    <div class="notice-head">
      <span>达耶TV资源</span>
      <button class="close-btn" onclick="closeNotice()">×</button>
    </div>
    <div class="notice-body">
      <div class="tip-text">本资源仅供个人观赏，禁止用于商业用途、二次分发与倒卖 倒卖死全家 一辈子发不了财</div>
      <a href="https://www.alipan.com/s/tf1gz22rbX6" target="_blank" class="line-btn">线路1（阿里云盘）</a>
      <a href="https://pan.quark.cn/s/826e0599f98c" target="_blank" class="line-btn">线路2（夸克网盘）</a>
    </div>
  </div>
</div>

<script>
const modal = document.getElementById("noticeModal");
function openNotice(){
  modal.classList.add("show");
}
function closeNotice(){
  modal.classList.remove("show");
}
// 点击遮罩关闭弹窗
modal.onclick = e => {
  if(e.target === modal) closeNotice();
}
</script>
</body>
</html>
