<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>达耶治疗院</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #f4f4f4;
  font-family: "Microsoft YaHei", sans-serif;
  color: #333;
  padding-bottom: 40px;
}

.top {
  background: #32c582;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}

.logo {
  font-size: 20px;
  font-weight: bold;
  color: white;
}

.btn {
  background: white;
  color: #32c582;
  border: none;
  padding: 6px 14px;
  border-radius: 3px;
  font-weight: bold;
  cursor: pointer;
  font-size: 14px;
}
.btn:hover {
  background: #f0f0f0;
}

.container {
  max-width: 1000px;
  margin: 20px auto;
  padding: 0 15px;
}


.main-notice {
  background: white;
  border: 1px solid #e5e5e5;
  border-radius: 4px;
  padding: 20px;
  margin-bottom: 20px;
  line-height: 1.8;
  font-size: 14px;
}
.main-notice h3 {
  color: #32c582;
  margin-bottom: 12px;
  font-size: 16px;
  text-align: center;
}


.bottom-notice {
  background: white;
  border: 1px solid #e5e5e5;
  border-radius: 4px;
  padding: 15px;
  text-align: center;
  font-size: 14px;
  color: #666;
}

.notice-modal {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.notice-modal.show {
  display: flex;
}
.notice-box {
  background: white;
  width: 90%;
  max-width: 380px;
  border-radius: 6px;
  overflow: hidden;
}
.notice-head {
  background: #32c582;
  color: white;
  padding: 12px 15px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
}
.close-btn {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}
.notice-body {
  padding: 25px 20px;
  text-align: center;
  font-size: 15px;
}
.join-btn {
  background: #32c582;
  color: white !important;
  padding: 8px 16px;
  border-radius: 4px;
  text-decoration: none;
  display: inline-block;
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="top">
  <div class="logo">达耶治疗院</div>
  <button class="btn" onclick="openNotice()">公告</button>
</div>

<div class="container">
  <div class="main-notice">
    <h3>📢 暂停更新公告</h3>
    <p>各位关注达耶治疗院的朋友：</p>
    <p>由于本人频繁被奴奴和内鬼举报，即日起，本人将暂停本网站的更新工作。</p>
    <p>暂停期间不再发布新内容，也不再接收相关研究委托。</p>
    <p style="text-align:right; margin-top:10px;">—— 圣诞狐</p>
  </div>


<div class="notice-modal" id="noticeModal">
  <div class="notice-box">
    <div class="notice-head">
      <span>公告</span>
      <button class="close-btn" onclick="closeNotice()">×</button>
    </div>
    <div class="notice-body">
      <div>救助仓鼠Q群</div>
      <a href="https://qm.qq.com/q/rJmCTpfUUo" target="_blank" class="join-btn">
        点击加入QQ群
      </a>
    </div>
  </div>
</div>

<script>
const modal = document.getElementById("noticeModal");
function openNotice(){ modal.classList.add("show"); }
function closeNotice(){ modal.classList.remove("show"); }
modal.onclick = e => { if(e.target === this) closeNotice(); }
</script>

</body>
</html>
